name: Deploy prototype to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static export
        working-directory: web
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      # Next.js's basePath rewrites JS/HTML-embedded asset paths automatically,
      # but not raw url(...) references inside globals.css (fonts + two
      # background images) — those are prefixed here as a build-only step so
      # local dev / the ngrok server never need the subpath.
      - name: Prefix CSS asset URLs with the Pages subpath
        working-directory: web
        run: |
          css_file=$(find out/_next/static/css -name "*.css")
          sed -i -E "s#url\(/fonts/#url(/${{ github.event.repository.name }}/fonts/#g; s#url\(/images/#url(/${{ github.event.repository.name }}/images/#g" "$css_file"

      - name: Disable Jekyll processing
        run: touch web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
